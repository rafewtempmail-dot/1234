name: Unzip Project Automatically
on:
  push:
    branches:
      - main

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check and Unzip File
        run: |
          if [ -f project.zip ]; then
            echo "Zip file found! Unzipping..."
            unzip -o project.zip
            rm project.zip
            echo "Unzipped and zip file deleted successfully."
          else
            echo "No project.zip found."
          fi

      - name: Commit and Push Unzipped Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff-index --quiet HEAD || git commit -m "Automatically unzipped project files and removed zip"
          git push
